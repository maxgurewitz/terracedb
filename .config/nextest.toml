nextest-version = "0.9.132"

[profile.default]
slow-timeout = { period = "15s", terminate-after = 1, grace-period = "0s" }

[[profile.default.overrides]]
filter = '''
test(whole_system_execution_domain_campaigns_remain_deterministic_across_seeds)
or test(whole_system_execution_domain_simulation_seed_campaign_is_reproducible)
'''
slow-timeout = { period = "30s", terminate-after = 1, grace-period = "0s" }

[profile.pre-commit]
inherits = "default"
default-filter = '''
not (
  test(whole_system_execution_domain_campaigns_remain_deterministic_across_seeds)
  or test(whole_system_execution_domain_simulation_seed_campaign_is_reproducible)
)
'''

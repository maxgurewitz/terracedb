nextest-version = "0.9.132"

[profile.default]
slow-timeout = { period = "15s", terminate-after = 1, grace-period = "0s" }

[[profile.default.overrides]]
filter = "binary(generated_node_upstream) & test(/^generated_upstream_node_suite$/)"
slow-timeout = { period = "300s", terminate-after = 2, grace-period = "5s" }

[profile.pre-commit]
inherits = "default"

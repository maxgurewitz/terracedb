name: real-remote-chaos

on:
  workflow_dispatch:
    inputs:
      campaign:
        description: Campaign to run
        required: true
        default: nightly
        type: choice
        options:
          - nightly
          - smoke

jobs:
  chaos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run selected campaign
        run: bash scripts/run_remote_chaos_suite.sh "${{ inputs.campaign }}"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-remote-chaos-${{ inputs.campaign }}
          path: .tmp/remote-chaos-artifacts

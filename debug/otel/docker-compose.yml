services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: terracedb-otel-lgtm
    restart: unless-stopped
    ports:
      - "3300:3000" # Grafana UI
      - "3320:3200" # Tempo API + MCP endpoint
      - "14317:4317" # OTLP gRPC receiver
      - "14318:4318" # OTLP HTTP receiver
    volumes:
      - otel_lgtm_data:/otel-lgtm
      - ./tempo-config.yaml:/otel-lgtm/tempo-config.yaml:ro

volumes:
  otel_lgtm_data:

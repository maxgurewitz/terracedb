[package]
name = "boa_gc"
description = "Garbage collector for the Boa JavaScript engine."
keywords = ["javascript", "js", "garbage", "memory"]
categories = ["command-line-utilities"]
version = "1.0.0-dev"
edition = "2024"
authors = ["boa-dev"]
license = "Unlicense OR MIT"
repository = "https://github.com/boa-dev/boa"
rust-version = "1.91.0"

[features]
thin-vec = ["dep:thin-vec"]
icu = ["dep:icu_locale_core"]
boa_string = ["dep:boa_string"]
either = ["dep:either"]
arrayvec = ["dep:arrayvec"]

[dependencies]
boa_macros = { git = "https://github.com/boa-dev/boa", rev = "f5e88de558e038f0ae675a012d59917a098f44b6" }
hashbrown = "0.16.1"
boa_string = { git = "https://github.com/boa-dev/boa", rev = "f5e88de558e038f0ae675a012d59917a098f44b6", optional = true }
either = { version = "1.15.0", optional = true }
thin-vec = { version = "0.2.14", optional = true }
icu_locale_core = { version = "~2.1.1", default-features = false, optional = true }
arrayvec = { version = "0.7.6", optional = true }

[package.metadata.docs.rs]
all-features = true
